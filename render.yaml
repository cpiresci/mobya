services:
  - type: web
    name: mobya-api
    runtime: node
    region: oregon
    plan: free
    # FIX #3: prisma generate apenas — schema já aplicado via migrate_monetization.sql
    # db push --accept-data-loss foi removido pois pode destruir dados em produção
    buildCommand: npm ci && npx prisma generate
    startCommand: node src/server.js
    healthCheckPath: /api/v1/health
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: AI_MAX_TOKENS
        value: "1500"
      - key: FRONTEND_URL
        value: https://mobya.com.br
      - key: LOG_LEVEL
        value: info
      - key: AI_RATE_LIMIT_MAX
        value: "30"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: SMTP_HOST
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: MOBYA <noreply@mobya.com.br>
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: SAMBANOVA_MODEL
        value: Meta-Llama-3.3-70B-Instruct
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_MODEL
        value: llama3.1-70b
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct
